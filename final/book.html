<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>InkVerse | Book Consultation</title>

    <meta name="description" content="Book a tattoo consultation with InkVerse and begin your tattoo journey.">

    <meta name="author" content="Lwazi Lubisi">

    <!-- Open Graph -->

    <meta property="og:title" content="InkVerse Consultation">

    <meta property="og:description" content="Book your tattoo consultation with InkVerse.">

    <meta property="og:image" content="images/hero.webp">

    <meta property="og:type" content="website">


    <!-- Google Fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">


    <!-- CSS -->

    <link rel="stylesheet" href="styles/normalize.css">

    <link rel="stylesheet" href="styles/small.css">

    <link rel="stylesheet" href="styles/larger.css">


    <!-- JS -->

    <script src="scripts/navigation.js" defer></script>

    <script src="scripts/form.js" defer></script>

    <script src="scripts/dates.js" defer></script>

</head>

<body>


    <header>

        <div class="logo-container">

            <img src="images/spider-face-svgrepo-com.svg" alt="InkVerse Logo" class="logo" width="50">

            <span class="site-name">

                InkVerse

            </span>

            <button id="menuBtn" aria-label="Toggle Navigation">

                ☰

            </button>

        </div>


        <nav id="navMenu">

            <ul>

                <li>

                    <a href="index.html">

                        Home

                    </a>

                </li>


                <li>

                    <a href="gallery.html">

                        Gallery

                    </a>

                </li>


                <li>

                    <a href="book.html" class="active">

                        Book Consultation

                    </a>

                </li>

            </ul>

        </nav>

    </header>



    <main>


        <section class="form-header">

            <h1>

                Book a Consultation

            </h1>

            <p>

                Tell us about your tattoo idea and
                we'll help bring it to life.

            </p>

        </section>



        <section class="booking-section">


            <form action="thankyou.html" method="GET" id="bookingForm">


                <!-- First Name -->


                <label>

                    First Name

                    <input type="text" name="firstname" required title="Enter your first name"
                        autocomplete="given-name">

                </label>



                <!-- Last Name -->


                <label>

                    Last Name

                    <input type="text" name="lastname" required title="Enter your last name" autocomplete="family-name">

                </label>




                <!-- Email -->


                <label>

                    Email

                    <input type="email" name="email" required title="Enter a valid email" autocomplete="email"
                        placeholder="example@email.com">

                </label>




                <!-- Phone -->


                <label>

                    Mobile Number

                    <input type="tel" name="phone" required title="Enter your mobile number" autocomplete="tel">

                </label>




                <!-- Tattoo Style -->


                <label>

                    Tattoo Style

                    <select name="style" required>

                        <option value="">

                            Select a style

                        </option>

                        <option value="Traditional">

                            Traditional

                        </option>

                        <option value="Japanese">

                            Japanese

                        </option>

                        <option value="Realism">

                            Realism

                        </option>

                        <option value="Tribal">

                            Tribal

                        </option>

                        <option value="Minimalist">

                            Minimalist

                        </option>

                    </select>

                </label>





                <!-- Placement -->


                <label>

                    Placement

                    <select name="placement" required>


                        <option value="">

                            Select placement

                        </option>


                        <option value="Arm">

                            Arm

                        </option>


                        <option value="Leg">

                            Leg

                        </option>


                        <option value="Back">

                            Back

                        </option>


                        <option value="Chest">

                            Chest

                        </option>


                        <option value="Hand">

                            Hand

                        </option>


                        <option value="Neck">

                            Neck

                        </option>


                    </select>

                </label>





                <!-- Budget -->


                <label>

                    Estimated Budget

                    <select name="budget" required>


                        <option value="">

                            Select Budget

                        </option>


                        <option value="under100">

                            Under $100

                        </option>


                        <option value="100to300">

                            $100 - $300

                        </option>


                        <option value="300to700">

                            $300 - $700

                        </option>


                        <option value="700plus">

                            $700+

                        </option>


                    </select>

                </label>





                <!-- Description -->


                <label>

                    Describe Your Tattoo Idea


                    <textarea name="description" rows="6" placeholder="Describe your tattoo idea..."
                        title="Tattoo description">

                </textarea>

                </label>





                <!-- Timestamp -->


                <input type="hidden" id="timestamp" name="timestamp">





                <!-- Submit -->


                <input type="submit" value="Book Consultation" class="submit-btn">

            </form>

        </section>


    </main>





    <footer>


        <div class="socials">


            <a href="https://github.com/pinokiyow" target="_blank">

                <img src="images/github-142-svgrepo-com.svg" alt="GitHub">

            </a>



            <a href="https://linkedin.com/in/yourprofile" target="_blank">

                <img src="images/linkedin-1-svgrepo-com.svg" alt="LinkedIn">

            </a>



            <a href="https://facebook.com" target="_blank">

                <img src="images/facebook-color-svgrepo-com.svg" alt="Facebook">

            </a>


        </div>



        <p>

            &copy;

            <span id="year">

            </span>

            Lwazi Lubisi

        </p>



        <p>

            WDD 231 Final Project

        </p>



        <p>

            <a href="attributions.html">

                Attributions

            </a>

        </p>



        <p>

            <a href="https://youtube.com/your-video-link" target="_blank">

                Project Video Demonstration

            </a>

        </p>


    </footer>


</body>

</html>
